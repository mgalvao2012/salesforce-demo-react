name: CI · uiBundle

on:
  pull_request:
    paths:
      - "force-app/main/default/uiBundles/myreactapp/**"
      - "packages/chat-protocol/**"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "package.json"
      - ".github/workflows/ci-uibundle.yml"
  push:
    branches: [main]
    paths:
      - "force-app/main/default/uiBundles/myreactapp/**"
      - "packages/chat-protocol/**"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "package.json"
      - ".github/workflows/ci-uibundle.yml"

concurrency:
  group: ci-uibundle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared protocol
        run: pnpm --filter @chat/protocol build

      - name: Lint uiBundle
        run: pnpm --filter base-react-app lint

      - name: Test uiBundle
        run: pnpm --filter base-react-app exec vitest run

      - name: Build uiBundle
        run: pnpm --filter base-react-app build

      - name: Upload dist artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: uibundle-dist
          path: force-app/main/default/uiBundles/myreactapp/dist
          retention-days: 7
